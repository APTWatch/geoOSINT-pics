<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GeoOSINT Challenges</title>

  <style>
    body {
      margin: 0;
      padding: 40px;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: scale(1.03);
    }

    img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .title {
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>GeoOSINT Challenge Gallery</h1>

  <div class="gallery">

    <a class="card" href="/br.jpg">
      <img src="br.jpg">
      <div class="title">Brazil Challenge</div>
    </a>

    <a class="card" href="/hk.png">
      <img src="hk.png">
      <div class="title">Hong Kong Challenge</div>
    </a>

    <a class="card" href="/rn.jpg">
      <img src="rn.jpg">
      <div class="title">Random Challenge</div>
    </a>

    <a class="card" href="/sk.jpg">
      <img src="sk.jpg">
      <div class="title">South Korea Challenge</div>
    </a>

  </div>

</body>
</html>
